version: '3.7'

services:
  alesap:
    image: davidsiaw/alesap-server
    deploy:
      update_config:
        order: stop-first
    environment:
      LETSENCRYPT_HOST: api.alesap.astrobunny.net
      VIRTUAL_HOST: api.alesap.astrobunny.net
      VIRTUAL_PORT: 3000
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${ALESAP_MASTER_KEY}
      ALLOWED_ORIGINS: alesap.astrobunny.net
      DATABASE_URL: ${ALESAP_DB_URL}
    container_name: alesap
    networks:
      - alesap

  alesap-db:
    image: postgres:17
    deploy:
      update_config:
        order: stop-first
    environment:
      POSTGRES_PASSWORD: ${ALESAP_PG_PASS}
      POSTGRES_USER: ${ALESAP_PG_USER}
      POSTGRES_DB: ${ALESAP_PG_DB}
    container_name: alesap-db
    volumes:
      - alesap-server:/var/lib/postgresql/data
    networks:
      - alesap
    ports:
      - 5432
        
volumes:
  alesap-server:
    external: true

networks:
  alesap:
    external: true